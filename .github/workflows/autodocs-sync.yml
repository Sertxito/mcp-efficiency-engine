name: AutoDocs Sync

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  autodocs-pr-check:
    if: github.event_name == 'pull_request'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Compile AutoDocs
        run: py -3 -m scripts.wiki.wiki_compiler
        shell: pwsh

      - name: Ensure npm README is updated when package surface changes
        shell: pwsh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          node -e "
          const fs = require('node:fs');
          const { execSync } = require('node:child_process');
          const baseSha = process.env.BASE_SHA;
          if (!baseSha) {
            console.log('BASE_SHA is not available; skipping npm README check.');
            process.exit(0);
          }
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const publishEntries = (pkg.files || []).map((entry) => entry.replace(/^\\.\\//, ''));
          const changed = execSync('git diff --name-only ' + baseSha + '...HEAD', { encoding: 'utf8' })
            .split(/\\r?\\n/)
            .map((line) => line.trim())
            .filter(Boolean);
          const readmeChanged = changed.includes('README.md');
          const isNpmRelevant = (file) =>
            file === 'package.json' ||
            file === 'package-lock.json' ||
            publishEntries.some((entry) => (entry.endsWith('/') ? file.startsWith(entry) : file === entry));
          const npmRelevantChanges = changed.filter((file) => file !== 'README.md' && isNpmRelevant(file));
          if (npmRelevantChanges.length > 0 && !readmeChanged) {
            console.error('Detected npm-impacting changes without README.md update.');
            console.error('npm-impacting files:');
            for (const file of npmRelevantChanges) console.error('- ' + file);
            console.error('Please update README.md (npm docs) in the same PR.');
            process.exit(1);
          }
          if (npmRelevantChanges.length > 0) {
            console.log('npm-impacting changes detected and README.md was updated.');
          } else {
            console.log('No npm-impacting changes detected.');
          }
          "

      - name: Validate generated artifacts are committed
        shell: pwsh
        run: |
          git add autodocs/generated
          git add autodocs/site
          $changes = git status --porcelain -- autodocs/generated autodocs/site
          if ([string]::IsNullOrWhiteSpace($changes)) {
            Write-Host "AutoDocs artifacts are up to date"
          } else {
            Write-Host "Detected generated drift:"
            Write-Host $changes
            Write-Error "AutoDocs artifacts are outdated. Run: py -3 -m scripts.wiki.wiki_compiler and commit generated changes."
            exit 1
          }

      - name: Summary
        shell: pwsh
        run: |
          echo "## AutoDocs PR Check" >> $env:GITHUB_STEP_SUMMARY
          echo "- Validation mode: strict" >> $env:GITHUB_STEP_SUMMARY
          echo "- Entrypoint: py -3 -m scripts.wiki.wiki_compiler" >> $env:GITHUB_STEP_SUMMARY
          echo "- Required artifacts: autodocs/generated + autodocs/site" >> $env:GITHUB_STEP_SUMMARY

  autodocs-sync:
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Compile AutoDocs
        run: py -3 -m scripts.wiki.wiki_compiler
        shell: pwsh

      - name: Commit projected docs and unified graph
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add autodocs/generated
          git add autodocs/site
          $changes = git status --porcelain -- autodocs/generated autodocs/site
          if ([string]::IsNullOrWhiteSpace($changes)) {
            Write-Host "No AutoDocs changes to commit"
          } else {
            Write-Host "Detected generated drift:"
            Write-Host $changes
            git commit -m "chore(autodocs): refresh unified graph and projection"
            git push
          }

      - name: Summary
        shell: pwsh
        run: |
          echo "## AutoDocs Sync" >> $env:GITHUB_STEP_SUMMARY
          echo "- Entrypoint: py -3 -m scripts.wiki.wiki_compiler" >> $env:GITHUB_STEP_SUMMARY
          echo "- Output graph: autodocs/generated/unified-graph.json" >> $env:GITHUB_STEP_SUMMARY
          echo "- Projection dir: autodocs/site" >> $env:GITHUB_STEP_SUMMARY