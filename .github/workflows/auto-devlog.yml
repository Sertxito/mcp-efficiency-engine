name: Auto-Generate DevLog

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      commits_to_analyze:
        description: 'Commits to analyze'
        required: false
        default: '10'

permissions:
  contents: write
  pull-requests: write

jobs:
  devlog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install PowerShell
        run: sudo apt-get update && sudo apt-get install -y powershell

      - name: Generate devlog
        run: pwsh scripts/github/create-devlog.ps1 -CommitsToAnalyze 10 -DryRun
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Check if devlog was created
        id: check_devlog
        run: |
          if (Test-Path "autodocs/site/devlog/devlog-$(Get-Date -Format 'yyyy-MM-dd').md") {
            echo "created=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            echo "filename=devlog-$(Get-Date -Format 'yyyy-MM-dd').md" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            echo "created=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
        shell: pwsh
        continue-on-error: true

      - name: Report summary
        run: |
          echo "✅ DevLog workflow completed" >> $GITHUB_STEP_SUMMARY
          echo "- Analyzed commits: 10" >> $GITHUB_STEP_SUMMARY
          echo "- Devlog created: ${{ steps.check_devlog.outputs.created }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next:** DevLog files are in autodocs/site/devlog/" >> $GITHUB_STEP_SUMMARY
