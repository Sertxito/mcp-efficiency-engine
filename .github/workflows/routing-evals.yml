name: Routing Evals Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: routing-evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  routing-evals:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run routing evals
        run: python ./scripts/intake/run-routing-evals.py

      - name: Verify all tests passed
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          
          report = Path('observability/evals/routing-eval-report.json')
          if not report.exists():
              raise SystemExit('routing-eval-report.json not found')
          
          data = json.loads(report.read_text(encoding='utf-8'))
          failed = int(data.get('cases_failed', 0))
          total = int(data.get('cases_total', 0))
          passed = int(data.get('cases_passed', 0))
          print(f'Routing evals: {passed}/{total} passed, failed={failed}')
          if failed > 0:
              raise SystemExit(1)
          PY

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: routing-eval-report
          path: observability/evals/routing-eval-report.json
          retention-days: 30
