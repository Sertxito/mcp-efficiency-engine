name: Auto-Manage Issues

on:
  schedule:
    - cron: '0 9 * * MON'  # Every Monday at 9 AM UTC
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: assign, review, or close'
        required: true
        default: 'assign'
        type: choice
        options:
          - assign
          - review
          - close
          - all

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install PowerShell
        run: sudo apt-get update && sudo apt-get install -y powershell

      - name: Install PowerShell
        run: sudo apt-get update && sudo apt-get install -y powershell

      - name: Run issue management (DryRun)
        run: |
          echo "👥 Checking open issues..."
          gh issue list --limit 5 --json title,state
          echo ""
          echo "Workflow ready for manual execution"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create activity report
        run: |
          echo "📊 Issue Management Report — $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Ready for manual trigger" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Available actions:" >> $GITHUB_STEP_SUMMARY
          echo "- \`gh workflow run auto-manage-issues.yml\` (default: assign)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To manage issues manually:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pwsh scripts/github/manage-issues.ps1 -Action assign" >> $GITHUB_STEP_SUMMARY
          echo "pwsh scripts/github/manage-issues.ps1 -Action review" >> $GITHUB_STEP_SUMMARY
          echo "pwsh scripts/github/manage-issues.ps1 -Action close" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
