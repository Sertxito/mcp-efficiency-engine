name: Auto-Manage Issues

on:
  schedule:
    - cron: '0 9 * * MON'  # Every Monday at 9 AM UTC
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: assign, review, or close'
        required: true
        default: 'assign'
        type: choice
        options:
          - assign
          - review
          - close
          - all

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install PowerShell
        run: sudo apt-get update && sudo apt-get install -y powershell

      - name: Assign Copilot to issues
        if: contains(fromJSON('["assign", "all"]'), github.event.inputs.action || 'assign')
        run: pwsh scripts/github/manage-issues.ps1 -Action assign
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Request Copilot reviews on PRs
        if: contains(fromJSON('["review", "all"]'), github.event.inputs.action || 'assign')
        run: pwsh scripts/github/manage-issues.ps1 -Action review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-close resolved issues
        if: contains(fromJSON('["close", "all"]'), github.event.inputs.action || 'assign')
        run: pwsh scripts/github/manage-issues.ps1 -Action close
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create activity report
        if: always()
        run: |
          echo "📊 Issue Management Report — $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Actions executed:" >> $GITHUB_STEP_SUMMARY
          echo "- Assign: ${{ contains(fromJSON('[\"assign\", \"all\"]'), github.event.inputs.action || 'assign') }}" >> $GITHUB_STEP_SUMMARY
          echo "- Review: ${{ contains(fromJSON('[\"review\", \"all\"]'), github.event.inputs.action || 'assign') }}" >> $GITHUB_STEP_SUMMARY
          echo "- Close: ${{ contains(fromJSON('[\"close\", \"all\"]'), github.event.inputs.action || 'assign') }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📌 Check run logs for details" >> $GITHUB_STEP_SUMMARY

      - name: Notify if issues not managed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Issue management workflow failed. Check [workflow logs](' + context.payload.pull_request.url + '/checks) for details.'
            })
