name: Auto-Sync to boost_sertxIA

on:
  push:
    branches: [main]
    paths:
      - 'projects/**'
      - '.github/specs/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: azure/setup-kubectl@v3

      - name: Install PowerShell
        run: sudo apt-get update && sudo apt-get install -y powershell

      - name: Configure GitHub CLI
        run: |
          gh auth status || echo "✓ GitHub CLI disponible"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install PowerShell
        run: sudo apt-get update && sudo apt-get install -y powershell

      - name: Run sync script (DryRun)
        run: pwsh scripts/github/sync-repo.ps1 -DryRun
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Report summary
        run: |
          echo "✅ Auto-Sync workflow completed" >> $GITHUB_STEP_SUMMARY
          echo "- Sync check: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Source: projects/** changes" >> $GITHUB_STEP_SUMMARY
          echo "- Target: boost_sertxIA" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** Running in DryRun mode. Manual sync available on demand." >> $GITHUB_STEP_SUMMARY
