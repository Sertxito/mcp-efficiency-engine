name: CI — Spec Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate Specs & Code (Windows)
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile Python scripts
        run: python -m compileall -q .\scripts
        shell: pwsh

      - name: Validate routing evals
        run: py -3 .\scripts\intake\run-routing-evals.py
        shell: pwsh

      - name: Validate security
        run: py -3 .\scripts\intake\validate-security.py
        shell: pwsh

      - name: Validate database routing
        run: py -3 .\scripts\intake\validate-database-routing.py
        shell: pwsh

      - name: Validate RAG routing
        run: py -3 .\scripts\intake\validate-rag-routing.py
        shell: pwsh

      - name: Validate context
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\setup\validate-context.ps1
        shell: pwsh

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: routing-eval-report
          path: observability/evals/routing-eval-report.json
          retention-days: 30

