name: CI — Spec Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  validate:
    name: Validate Specs & Code
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
        shell: pwsh

      - name: Python compile check
        run: |
          python -m compileall -q .\scripts
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: pwsh

      - name: Validate context
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File .\scripts\setup\validate-context.ps1
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: pwsh

      - name: Run routing evals (spec: architecture, routing, observability, optimization)
        run: |
          py -3 .\scripts\intake\run-routing-evals.py
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: pwsh

      - name: Validate security (spec: security)
        run: |
          py -3 .\scripts\intake\validate-security.py
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: pwsh

      - name: Validate database routing (spec: database)
        run: |
          py -3 .\scripts\intake\validate-database-routing.py
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: pwsh

      - name: Validate RAG local routing (spec: rag)
        run: |
          py -3 .\scripts\intake\validate-rag-routing.py
          if ($LASTEXITCODE -ne 0) { exit 1 }
        shell: pwsh

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: routing-eval-report
          path: observability/evals/routing-eval-report.json
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('observability/evals/routing-eval-report.json', 'utf8'));
            const passed = report.cases_passed || 0;
            const total = report.cases_total || 0;
            const status = report.cases_failed === 0 ? '✅ PASS' : '❌ FAIL';
            
            const comment = `## CI Validation Results
            
            ${status}
            
            - **Routing Evals**: ${passed}/${total} passed
            - **Security**: ✅
            - **Database Routing**: ✅
            - **RAG Routing**: ✅
            - **Python Compile**: ✅
            - **Context Validation**: ✅
            
            See artifacts for detailed reports.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
